<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Artouste">
  <!-- Fond : metal petrole, coins arrondis -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22343f"/>
      <stop offset="1" stop-color="#13212a"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Rotor tripale vu de dessus : 3 pales a 120 degres, bouts de pale jaunes -->
  <g>
    <g>
      <rect x="30.3" y="6" width="3.4" height="26" rx="1.7" fill="#f4a032"/>
      <circle cx="32" cy="7.5" r="2.3" fill="#ffd27a"/>
    </g>
    <g transform="rotate(120 32 32)">
      <rect x="30.3" y="6" width="3.4" height="26" rx="1.7" fill="#f4a032"/>
      <circle cx="32" cy="7.5" r="2.3" fill="#ffd27a"/>
    </g>
    <g transform="rotate(240 32 32)">
      <rect x="30.3" y="6" width="3.4" height="26" rx="1.7" fill="#f4a032"/>
      <circle cx="32" cy="7.5" r="2.3" fill="#ffd27a"/>
    </g>
  </g>

  <!-- Moyeu central -->
  <circle cx="32" cy="32" r="6.4" fill="#21333d" stroke="#f4a032" stroke-width="2.4"/>
  <circle cx="32" cy="32" r="2" fill="#ffc56b"/>
</svg>
