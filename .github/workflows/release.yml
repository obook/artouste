name: Release

# Construit les exécutables Linux et Windows et publie une release GitHub avec
# les deux archives. Se déclenche au push d'un tag de version (v1.2.3), ou
# manuellement depuis l'onglet Actions.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # GLFW a besoin des en-têtes X11 et OpenGL ; GLAD génère ses sources via
      # Python (déjà présent sur le runner). libcurl (paquet de développement)
      # est désormais obligatoire : la radio internet du cockpit en dépend.
      - name: Installer les dépendances système
        run: |
          sudo apt-get update
          sudo apt-get install -y xorg-dev libgl1-mesa-dev libcurl4-openssl-dev

      # Accélère les builds suivants : on garde les sources tierces clonées par
      # FetchContent (assimp est volumineux).
      - name: Cache des dépendances FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-linux-${{ hashFiles('cmake/Dependencies.cmake') }}

      # CMAKE_POLICY_VERSION_MINIMUM=3.5 : les runners ont CMake 4.x, qui refuse le
      # vieux cmake_minimum_required de certaines dependances (GLAD). Cette option
      # leur accorde une compatibilite minimale.
      - name: Configurer
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Compiler
        run: cmake --build build -j

      - name: Tester
        run: ctest --test-dir build --output-on-failure

      - name: Empaqueter
        run: cd build && cpack

      - name: Publier l'artefact
        uses: actions/upload-artifact@v4
        with:
          name: artouste-linux
          path: build/artouste-*.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache des dépendances FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-windows-${{ hashFiles('cmake/Dependencies.cmake') }}

      # libcurl (radio internet du cockpit) via vcpkg, en statique : tout est
      # fondu dans artouste.exe, aucune DLL à embarquer dans le zip. Le triplet
      # x64-windows-static utilise le CRT statique (/MT), comme le reste du
      # projet (CMAKE_MSVC_RUNTIME_LIBRARY dans CMakeLists.txt). Un triplet -md
      # (CRT dynamique) provoquerait des symboles __imp_ non résolus à l'édition
      # de liens.
      - name: Installer libcurl (vcpkg, statique)
        shell: bash
        run: vcpkg install curl:x64-windows-static

      # En bash (present sur le runner) : PowerShell decoupe sinon l'argument
      # -DCMAKE_POLICY_VERSION_MINIMUM=3.5 au point decimal. La toolchain vcpkg
      # et le triplet statique exposent libcurl a find_package(CURL).
      - name: Configurer
        shell: bash
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows-static

      - name: Compiler
        run: cmake --build build --config Release -j

      - name: Tester
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Empaqueter
        run: cd build && cpack -C Release

      - name: Publier l'artefact
        uses: actions/upload-artifact@v4
        with:
          name: artouste-windows
          path: build/artouste-*.zip
          if-no-files-found: error

  release:
    name: Publier la release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    # Une release n'est créée que pour un tag, pas pour un lancement manuel.
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Récupérer les artefacts
        uses: actions/download-artifact@v4
        with:
          path: artefacts

      # La release et son texte sont créés à la main ; ici on ne fait qu'attacher
      # les archives, sans toucher au corps de la release (pas de notes générées).
      - name: Attacher les archives à la release
        uses: softprops/action-gh-release@v2
        with:
          files: artefacts/**/artouste-*
          generate_release_notes: false
